services:

  # ── Base de datos ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: iages_docker_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-iages_docker}
      POSTGRES_USER: ${DB_USER:-iages}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-iages} -d ${DB_NAME:-iages_docker}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - iages_net

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: iages_docker_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - iages_net

  # ── Backend Flask ────────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: iages_docker_backend
    restart: unless-stopped
    environment:
      CONTAINER_ROLE: backend
      FLASK_ENV: production
      DATABASE_URL: postgresql://${DB_USER:-iages}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-iages_docker}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      TOTP_ENCRYPTION_KEY: ${TOTP_ENCRYPTION_KEY}
      FIELD_ENCRYPTION_KEY: ${FIELD_ENCRYPTION_KEY}
      PORTAL_JWT_SECRET: ${PORTAL_JWT_SECRET:-}
      PORTAL_BASE_URL: ${PORTAL_BASE_URL:-http://localhost:8080/portal}
      SMTP_SERVER: ${SMTP_SERVER:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
    volumes:
      - storage_data:/app/storage
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - iages_net

  # ── Celery Worker ────────────────────────────────────────────────────────────
  celery:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: iages_docker_celery
    restart: unless-stopped
    environment:
      CONTAINER_ROLE: celery
      FLASK_ENV: production
      DATABASE_URL: postgresql://${DB_USER:-iages}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-iages_docker}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      TOTP_ENCRYPTION_KEY: ${TOTP_ENCRYPTION_KEY}
      FIELD_ENCRYPTION_KEY: ${FIELD_ENCRYPTION_KEY}
      SMTP_SERVER: ${SMTP_SERVER:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
    volumes:
      - storage_data:/app/storage
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - iages_net

  # ── nginx ────────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: iages_docker_nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-8080}:80"    # Puerto diferente para no chocar con producción
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/dist:/usr/share/nginx/html/app:ro
      - ./frontend/portal/dist:/usr/share/nginx/html/portal:ro
    depends_on:
      - backend
    networks:
      - iages_net

volumes:
  postgres_data:
  redis_data:
  storage_data:
  uploads_data:

networks:
  iages_net:
    driver: bridge
